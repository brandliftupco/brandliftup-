<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Let's Audit Your Local Growth | Metrix Mind</title>
  <meta name="description" content="Ready to scale? Contact Metrix Mind for a free lead audit. No commitment, just a clear plan for your clinic or local business growth.">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root { --black: #050507; --white: #f0eee8; --gold: #FFD45E; --orange: #FF5C1A; --purple: #7B2FFF; --dim: #1a1a24; --muted: #6b6b7a; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--black); color: var(--white); font-family: 'Syne', sans-serif; overflow-x: hidden; cursor: none; }
    .cursor { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; mix-blend-mode: difference; }
    .cursor-ring { width: 40px; height: 40px; border: 1.5px solid var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; transition: transform 0.15s ease; mix-blend-mode: difference; }
    nav { position: fixed; top: 0; left: 0; right: 0; padding: 24px 60px; display: flex; align-items: center; justify-content: space-between; z-index: 100; backdrop-filter: blur(12px); background: rgba(5, 5, 7, 0.7); border-bottom: 1px solid rgba(255, 212, 94, 0.08); }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--white); display: flex; align-items: center; text-decoration: none; }
    .nav-logo span { color: var(--gold); }
    .nav-logo-img { height: 44px; width: auto; margin-right: 12px; }
    .section { padding: 140px 60px 80px; }
    .contact-form { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: 1 / -1; }
    input, textarea, select { width: 100%; background: rgba(255, 212, 94, 0.02); border: 1px solid rgba(255, 212, 94, 0.1); padding: 18px; border-radius: 12px; color: var(--white); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.3s; }
    input:focus, textarea:focus, select:focus { border-color: var(--gold); }
    .btn-submit { background: var(--gold); color: var(--black); padding: 20px; border: none; border-radius: 50px; font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
    .btn-submit:hover { background: var(--orange); transform: translateY(-3px); }
    @media (max-width: 768px) { .contact-form { grid-template-columns: 1fr; } .section { padding: 120px 30px 60px; } }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <nav>
    <a href="/" class="nav-logo"><img src="assets/logo.png" alt="BL Logo" class="nav-logo-img"> METRIX <span>MIND</span></a>
  </nav>
  <section class="section">
    <div style="text-align:center; margin-bottom:60px;">
      <h1 style="font-family:'Bebas Neue',sans-serif; font-size:80px;">BOOK YOUR<br><span>FREE LEAD AUDIT</span></h1>
      <p style="color:var(--muted); font-size:16px; margin-top:20px;">No pushy sales calls. Just a 15-minute breakdown of your local market opportunities.</p>
    </div>
    <form class="contact-form">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Work Email" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="url" placeholder="Company Website / GMB Link" class="full-width">
      <select class="full-width" required>
        <option value="" disabled selected>Monthly Ad Budget</option>
        <option>Under ₹25K</option>
        <option>₹25K - ₹65K</option>
        <option>₹65K - ₹1.5L</option>
        <option>₹1.5L+</option>
      </select>
      <textarea placeholder="Your Primary Growth Goal..." class="full-width" rows="5"></textarea>
      <button type="submit" class="btn-submit full-width">Claim My Free Audit →</button>
    </form>
  </section>
  <footer style="text-align:center; padding:40px; border-top:1px solid rgba(255,212,94,0.08);">
    <div style="font-family:'Space Mono', monospace; font-size:11px; color:var(--muted);">Registered in Noida, India. hello@brandliftup.in</div>
  </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.transform = `translate(${mx - 6}px, ${my - 6}px)`; });
    function animateRing() { rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12; ring.style.transform = `translate(${rx - 20}px, ${ry - 20}px)`; requestAnimationFrame(animateRing); }
    animateRing();
    document.querySelectorAll('a, button, .magnetic-btn').forEach(el => {
      el.addEventListener('mouseenter', () => { ring.style.width = '60px'; ring.style.height = '60px'; ring.style.borderColor = 'var(--orange)'; });
      el.addEventListener('mouseleave', () => { ring.style.width = '40px'; ring.style.height = '40px'; ring.style.borderColor = 'var(--gold)'; });
    });
    gsap.registerPlugin(ScrollTrigger);
    document.querySelectorAll('.reveal').forEach((el) => {
      gsap.set(el, { y: 60, opacity: 0 });
      gsap.to(el, { scrollTrigger: { trigger: el, start: "top 85%", toggleActions: "play none none reverse" }, y: 0, opacity: 1, duration: 1, ease: "power3.out" });
    });
    const magneticBtns = document.querySelectorAll('.magnetic-btn');
    magneticBtns.forEach(btn => {
      btn.addEventListener('mousemove', (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width/2;
        const y = e.clientY - rect.top - rect.height/2;
        gsap.to(btn, { x: x * 0.4, y: y * 0.4, duration: 0.5, ease: 'power3.out' });
      });
      btn.addEventListener('mouseleave', () => { gsap.to(btn, { x: 0, y: 0, duration: 0.7, ease: 'elastic.out(1, 0.3)' }); });
    });
  </script>
</body>
</html>
