<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Liftup — AI Digital Marketing Agency | Grow Your Brand 10x</title>
  <meta name="description"
    content="Brand Liftup is India's leading AI-powered digital marketing agency. We deliver 340% avg ROI with data-driven SEO, paid ads, social media & lead generation. Book a free strategy call today.">
  <meta name="keywords"
    content="digital marketing agency, AI marketing, SEO services India, paid ads, social media marketing, lead generation, brand identity">
  <meta property="og:title" content="Brand Liftup — AI Digital Marketing Agency">
  <meta property="og:description"
    content="We don't run ads. We print money. AI-powered marketing that delivers real results.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://brandliftup.in">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --black: #050507;
      --white: #f0eee8;
      --gold: #FFD45E;
      --orange: #FF5C1A;
      --purple: #7B2FFF;
      --dim: #1a1a24;
      --muted: #6b6b7a;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 12px;
      height: 12px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
      mix-blend-mode: difference;
    }

    .cursor-ring {
      width: 40px;
      height: 40px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.15s ease, width 0.2s, height 0.2s;
      mix-blend-mode: difference;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.35;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(5, 5, 7, 0.7);
      border-bottom: 1px solid rgba(255, 212, 94, 0.08);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--white);
    }

    .nav-logo span {
      color: var(--gold);
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-cta {
      background: var(--gold);
      color: var(--black);
      padding: 10px 24px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.3s, transform 0.2s;
    }

    .nav-cta:hover {
      background: var(--orange);
      transform: scale(1.04);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 120px 60px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(123, 47, 255, 0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(255, 92, 26, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 10%, rgba(255, 212, 94, 0.07) 0%, transparent 60%);
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 212, 94, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 212, 94, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 80% at 60% 50%, black 0%, transparent 70%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 900px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 212, 94, 0.08);
      border: 1px solid rgba(255, 212, 94, 0.25);
      padding: 8px 16px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-family: 'Space Mono', monospace;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-tag::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.9;
      letter-spacing: 2px;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .hero-title .line2 {
      color: transparent;
      -webkit-text-stroke: 1.5px var(--gold);
      display: block;
    }

    .hero-title .line3 {
      color: var(--orange);
      display: block;
    }

    .hero-sub {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 480px;
      margin-top: 28px;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 44px;
      animation: fadeUp 0.8s 0.45s ease both;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--black);
      padding: 16px 36px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-primary:hover {
      background: var(--orange);
      transform: translateY(-2px);
    }

    .btn-primary:hover::after {
      opacity: 1;
    }

    .btn-ghost {
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.3s;
    }

    .btn-ghost:hover {
      color: var(--gold);
    }

    .btn-ghost span {
      width: 36px;
      height: 1px;
      background: currentColor;
      transition: width 0.3s;
    }

    .btn-ghost:hover span {
      width: 54px;
    }

    /* FLOATING NUMBERS */
    .hero-stats {
      position: absolute;
      right: 60px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .stat-item {
      text-align: right;
    }

    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MARQUEE */
    .marquee-wrap {
      background: var(--gold);
      padding: 16px 0;
      overflow: hidden;
      position: relative;
    }

    .marquee-track {
      display: flex;
      gap: 0;
      animation: marquee 20s linear infinite;
      width: max-content;
    }

    .marquee-item {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--black);
      padding: 0 32px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .marquee-item::after {
      content: '✦';
      font-size: 14px;
      opacity: 0.5;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    /* SERVICES */
    .section {
      padding: 120px 60px;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::before {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--gold);
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 7vw, 96px);
      line-height: 0.95;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 60px;
    }

    .service-card {
      background: var(--dim);
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
      transition: background 0.4s;
      cursor: none;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--orange));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s;
    }

    .service-card:hover::before {
      transform: scaleX(1);
    }

    .service-card:hover {
      background: #1e1e2d;
    }

    .service-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      color: rgba(255, 212, 94, 0.08);
      line-height: 1;
      position: absolute;
      top: 24px;
      right: 32px;
      transition: color 0.4s;
    }

    .service-card:hover .service-num {
      color: rgba(255, 212, 94, 0.15);
    }

    .service-icon {
      font-size: 36px;
      margin-bottom: 24px;
      display: block;
    }

    .service-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 1px;
      margin-bottom: 14px;
      color: var(--white);
    }

    .service-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .service-arrow {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s;
    }

    .service-card:hover .service-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* WHY US */
    .why-section {
      padding: 120px 60px;
      background: linear-gradient(135deg, #0c0c14 0%, #050507 50%, #0f0a1a 100%);
      position: relative;
      overflow: hidden;
    }

    .why-section::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(123, 47, 255, 0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
    }

    .why-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      margin-top: 60px;
    }

    .why-left {
      position: relative;
    }

    .big-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(100px, 16vw, 220px);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 212, 94, 0.1);
      position: absolute;
      top: -40px;
      left: -20px;
      pointer-events: none;
      user-select: none;
    }

    .why-points {
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .why-point {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 28px;
      background: rgba(255, 212, 94, 0.03);
      border: 1px solid rgba(255, 212, 94, 0.08);
      transition: border-color 0.3s, background 0.3s;
    }

    .why-point:hover {
      border-color: rgba(255, 212, 94, 0.25);
      background: rgba(255, 212, 94, 0.06);
    }

    .why-icon {
      width: 48px;
      height: 48px;
      background: rgba(255, 212, 94, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 212, 94, 0.2);
    }

    .why-point-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--white);
    }

    .why-point-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* PROCESS */
    .process-section {
      padding: 120px 60px;
    }

    .process-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 60px;
    }

    .process-step {
      padding: 48px 32px;
      background: var(--dim);
      position: relative;
      overflow: hidden;
    }

    .process-step::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -1px;
      width: 2px;
      height: 40%;
      background: var(--gold);
      transform: translateY(-50%);
      opacity: 0.3;
    }

    .process-step:last-child::after {
      display: none;
    }

    .step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: rgba(255, 212, 94, 0.06);
      line-height: 1;
      position: absolute;
      top: 16px;
      right: 16px;
    }

    .step-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      margin-bottom: 12px;
      color: var(--gold);
    }

    .step-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* RESULTS */
    .results-section {
      padding: 120px 60px;
      background: var(--gold);
      position: relative;
      overflow: hidden;
    }

    .results-section .section-label {
      color: var(--black);
    }

    .results-section .section-label::before {
      background: var(--black);
    }

    .results-section .section-title {
      color: var(--black);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 60px;
    }

    .result-card {
      background: rgba(0, 0, 0, 0.08);
      padding: 48px 32px;
      transition: background 0.3s;
    }

    .result-card:hover {
      background: rgba(0, 0, 0, 0.15);
    }

    .result-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      color: var(--black);
      line-height: 1;
    }

    .result-label {
      font-size: 13px;
      color: rgba(0, 0, 0, 0.6);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      margin-top: 8px;
    }

    /* TESTIMONIALS */
    .testimonials {
      padding: 120px 60px;
    }

    .testi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 60px;
    }

    .testi-card {
      background: var(--dim);
      padding: 48px 40px;
      position: relative;
    }

    .testi-card::before {
      content: '"';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      color: rgba(255, 212, 94, 0.08);
      position: absolute;
      top: -10px;
      right: 30px;
      line-height: 1;
    }

    .testi-text {
      font-size: 15px;
      color: var(--white);
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .testi-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--orange));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: white;
    }

    .testi-name {
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--gold);
    }

    .testi-role {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .stars {
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* CTA */
    .cta-section {
      padding: 140px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--black) 0%, #0d0d1a 100%);
    }

    .cta-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(123, 47, 255, 0.15) 0%, transparent 60%);
    }

    .cta-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 10vw, 140px);
      line-height: 0.9;
      letter-spacing: 2px;
      position: relative;
      z-index: 2;
    }

    .cta-title span {
      color: var(--gold);
    }

    .cta-sub {
      font-size: 16px;
      color: var(--muted);
      max-width: 480px;
      margin: 24px auto 48px;
      line-height: 1.7;
      position: relative;
      z-index: 2;
    }

    .cta-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .btn-big {
      background: var(--gold);
      color: var(--black);
      padding: 20px 52px;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: all 0.3s;
    }

    .btn-big:hover {
      background: var(--orange);
      transform: translateY(-3px);
    }

    /* FOOTER */
    footer {
      padding: 60px;
      border-top: 1px solid rgba(255, 212, 94, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 3px;
    }

    .footer-logo span {
      color: var(--gold);
    }

    .footer-links {
      display: flex;
      gap: 32px;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .footer-links a:hover {
      color: var(--gold);
    }

    .footer-copy {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* SCROLL REVEAL */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* GLITCH EFFECT */
    .glitch {
      position: relative;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .glitch::before {
      color: var(--orange);
      animation: glitch1 3s infinite;
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    }

    .glitch::after {
      color: var(--purple);
      animation: glitch2 3s infinite;
      clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%);
    }

    @keyframes glitch1 {

      0%,
      90%,
      100% {
        transform: translate(0);
      }

      92% {
        transform: translate(-3px, 1px);
      }

      94% {
        transform: translate(3px, -1px);
      }

      96% {
        transform: translate(-2px, 0);
      }
    }

    @keyframes glitch2 {

      0%,
      90%,
      100% {
        transform: translate(0);
      }

      92% {
        transform: translate(3px, -1px);
      }

      94% {
        transform: translate(-3px, 1px);
      }

      96% {
        transform: translate(2px, 0);
      }
    }

/* HAMBURGER MENU */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:200;background:none;border:none;padding:8px}
.hamburger span{width:28px;height:2px;background:var(--gold);transition:all .3s;display:block}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-menu{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:rgba(5,5,7,.97);backdrop-filter:blur(20px);z-index:150;padding:100px 40px 40px;transition:right .4s cubic-bezier(.4,0,.2,1);border-left:1px solid rgba(255,212,94,.1)}
.mobile-menu.active{right:0}
.mobile-menu a{display:block;color:var(--white);text-decoration:none;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:16px 0;border-bottom:1px solid rgba(255,212,94,.08);transition:color .3s,padding-left .3s}
.mobile-menu a:hover{color:var(--gold);padding-left:12px}
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:140;opacity:0;pointer-events:none;transition:opacity .4s}
.mobile-overlay.active{opacity:1;pointer-events:auto}
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px}
.portfolio-card{background:var(--dim);position:relative;overflow:hidden;cursor:none}
.portfolio-img{width:100%;height:280px;display:flex;align-items:center;justify-content:center;font-size:48px}
.portfolio-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(5,5,7,.95) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:32px;transform:translateY(20px);opacity:0;transition:all .4s}
.portfolio-card:hover .portfolio-overlay{transform:translateY(0);opacity:1}
.portfolio-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--white);margin-bottom:8px}
.portfolio-cat{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'Space Mono',monospace;margin-bottom:12px}
.portfolio-metrics{display:flex;gap:24px}
.portfolio-metric{font-size:12px;color:var(--muted)}
.portfolio-metric strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px}
.pricing-card{background:var(--dim);padding:48px 36px;position:relative;overflow:hidden;transition:background .3s;display:flex;flex-direction:column}
.pricing-card.featured{background:#1e1e2d;border:1px solid rgba(255,212,94,.2)}
.pricing-badge{position:absolute;top:20px;right:-32px;background:var(--gold);color:var(--black);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 40px;transform:rotate(45deg)}
.pricing-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--white);margin-bottom:8px}
.pricing-desc{font-size:13px;color:var(--muted);margin-bottom:24px}
.pricing-price{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--gold);line-height:1;margin-bottom:4px}
.pricing-price small{font-size:16px;color:var(--muted);font-family:'Space Mono',monospace}
.pricing-features{list-style:none;margin:24px 0;flex-grow:1}
.pricing-features li{padding:10px 0;border-bottom:1px solid rgba(255,212,94,.06);font-size:14px;color:var(--muted);display:flex;align-items:center;gap:10px}
.pricing-features li::before{content:'\2713';color:var(--gold);font-weight:800}
.pricing-cta{display:block;text-align:center;background:transparent;border:1px solid rgba(255,212,94,.3);color:var(--gold);padding:14px;font-weight:800;font-size:12px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all .3s;margin-top:auto}
.pricing-cta:hover{background:var(--gold);color:var(--black)}
.pricing-card.featured .pricing-cta{background:var(--gold);color:var(--black)}
.pricing-card.featured .pricing-cta:hover{background:var(--orange)}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:60px}
.team-card{background:var(--dim);padding:40px 32px;text-align:center;transition:background .3s}
.team-card:hover{background:#1e1e2d}
.team-avatar{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:white}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:4px}
.team-role{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'Space Mono',monospace;margin-bottom:12px}
.team-bio{font-size:13px;color:var(--muted);line-height:1.6}
.faq-list{max-width:800px;margin:60px auto 0;display:flex;flex-direction:column;gap:2px}
.faq-item{background:var(--dim);overflow:hidden}
.faq-q{padding:24px 32px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .3s;user-select:none}
.faq-q:hover{background:#1e1e2d}
.faq-q::after{content:'+';font-size:28px;color:var(--gold);transition:transform .3s}
.faq-item.active .faq-q::after{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease}
.faq-a-inner{padding:0 32px 24px;font-size:14px;color:var(--muted);line-height:1.8}
.faq-item.active .faq-a{max-height:200px}
.contact-form{max-width:600px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px;position:relative;z-index:2}
.contact-form .full-width{grid-column:1/-1}
.contact-form input,.contact-form textarea,.contact-form select{width:100%;background:rgba(255,212,94,.04);border:1px solid rgba(255,212,94,.12);color:var(--white);padding:16px 20px;font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color .3s}
.contact-form input:focus,.contact-form textarea:focus,.contact-form select:focus{border-color:var(--gold)}
.contact-form input::placeholder,.contact-form textarea::placeholder{color:var(--muted)}
.contact-form textarea{resize:vertical;min-height:120px}
.contact-form select{appearance:none;cursor:pointer}
.contact-form select option{background:var(--black);color:var(--white)}
.form-btn{background:var(--gold);color:var(--black);padding:18px 40px;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:all .3s;font-family:'Syne',sans-serif}
.form-btn:hover{background:var(--orange);transform:translateY(-2px)}
.form-status{text-align:center;font-size:14px;color:var(--gold);margin-top:16px;min-height:24px}
.whatsapp-btn{position:fixed;bottom:28px;right:28px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;text-decoration:none;z-index:99;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:all .3s;animation:waPulse 2s infinite}
.whatsapp-btn:hover{transform:scale(1.1);box-shadow:0 6px 30px rgba(37,211,102,.6)}
@keyframes waPulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4)}50%{box-shadow:0 4px 30px rgba(37,211,102,.7)}}
.back-top{position:fixed;bottom:100px;right:28px;width:44px;height:44px;background:rgba(255,212,94,.1);border:1px solid rgba(255,212,94,.2);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:18px;text-decoration:none;z-index:99;opacity:0;pointer-events:none;transition:all .3s}
.back-top.visible{opacity:1;pointer-events:auto}
.back-top:hover{background:var(--gold);color:var(--black)}
.footer-social{display:flex;gap:16px}
.footer-social a{width:40px;height:40px;border:1px solid rgba(255,212,94,.15);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;transition:all .3s;font-size:16px}
.footer-social a:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,212,94,.08)}
.portfolio-grid,.pricing-grid{grid-template-columns:1fr 1fr}.team-grid{grid-template-columns:1fr 1fr}.footer-social{justify-content:center}}
.contact-form{grid-template-columns:1fr}}
